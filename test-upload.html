<!DOCTYPE html>
<html>
    <head>
        <title>Medical Reports Upload Test</title>
        <style>
        body { font-family: Arial; padding: 20px; }
        input, button { margin: 10px; padding: 8px; }
        #output { background: #f0f0f0; padding: 10px; margin-top: 20px; white-space: pre-wrap; }
    </style>
    </head>
    <body>
        <h1>Medical Reports V2 - Upload Test</h1>

        <div>
            <label>Token (from localStorage):</label>
            <input type="text" id="token" style="width: 400px;" />
            <button onclick="loadToken()">Load from LocalStorage</button>
        </div>

        <div>
            <label>Select File:</label>
            <input type="file" id="fileInput" />
        </div>

        <div>
            <button onclick="uploadFile()"
                style="font-size: 16px; padding: 10px 20px;">Upload</button>
        </div>

        <div id="output">Output will appear here...</div>

        <script>
        function log(msg) {
            document.getElementById('output').textContent += msg + '\n';
            console.log(msg);
        }

        function loadToken() {
            const token = localStorage.getItem('token');
            if (token) {
                document.getElementById('token').value = token;
                log('Token loaded: ' + token.substring(0, 20) + '...');
            } else {
                log('No token found in localStorage');
            }
        }

        async function uploadFile() {
            const output = document.getElementById('output');
            output.textContent = '';

            const fileInput = document.getElementById('fileInput');
            const token = document.getElementById('token').value;

            if (!fileInput.files.length) {
                log('❌ Please select a file');
                return;
            }

            if (!token) {
                log('❌ Please provide a token');
                return;
            }

            const file = fileInput.files[0];
            log(`📤 Uploading: ${file.name} (${file.size} bytes)`);

            const formData = new FormData();
            formData.append('file', file);

            try {
                const response = await fetch('http://localhost:5000/api/medical-reports/upload', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                    },
                    body: formData,
                });

                log(`📬 Response status: ${response.status}`);

                const data = await response.json();
                log('Response: ' + JSON.stringify(data, null, 2));

                if (response.ok) {
                    log('✅ Upload successful!');
                } else {
                    log('❌ Upload failed');
                }
            } catch (error) {
                log('❌ Error: ' + error.message);
            }
        }

        // Auto-load on page load
        window.onload = loadToken;
    </script>
    </body>
</html>
