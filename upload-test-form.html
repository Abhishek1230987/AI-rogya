<!DOCTYPE html>
<html>
    <head>
        <title>Medical Reports Upload Test - Proper FormData</title>
        <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }
        h1 { color: #333; margin-bottom: 30px; font-size: 24px; }
        .form-group {
            margin-bottom: 20px;
        }
        label { 
            display: block; 
            margin-bottom: 8px; 
            color: #555; 
            font-weight: 600;
        }
        input[type="text"],
        input[type="file"],
        button {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }
        input[type="text"]:focus,
        input[type="file"]:focus {
            outline: none;
            border-color: #667eea;
            background: #f9f9f9;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: 600;
            margin-top: 20px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        #output {
            background: #f5f5f5;
            border: 1px solid #ddd;
            border-radius: 5px;
            padding: 15px;
            margin-top: 20px;
            max-height: 300px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .success { color: #28a745; }
        .error { color: #dc3545; }
        .info { color: #0066cc; }
    </style>
    </head>
    <body>
        <div class="container">
            <h1>📄 Medical Reports Upload</h1>

            <div class="form-group">
                <label>Token:</label>
                <input type="text" id="token"
                    placeholder="Paste your JWT token here" />
                <button type="button" onclick="loadFromStorage()"
                    style="margin-top: 8px; background: #6c757d;">Load from
                    LocalStorage</button>
            </div>

            <div class="form-group">
                <label>Select PDF File:</label>
                <input type="file" id="fileInput"
                    accept=".pdf,.jpg,.jpeg,.png,.doc,.docx,.txt" />
            </div>

            <button onclick="uploadFile()" id="uploadBtn">📤 Upload
                File</button>

            <div id="output">Ready...</div>
        </div>

        <script>
        function log(msg, type = 'info') {
            const output = document.getElementById('output');
            const timestamp = new Date().toLocaleTimeString();
            const prefix = type === 'error' ? '❌' : type === 'success' ? '✅' : 'ℹ️';
            const line = `[${timestamp}] ${prefix} ${msg}\n`;
            output.textContent += line;
            output.scrollTop = output.scrollHeight;
            console.log(msg);
        }

        function loadFromStorage() {
            const token = localStorage.getItem('token');
            if (token) {
                document.getElementById('token').value = token;
                log('Token loaded from localStorage', 'success');
            } else {
                log('No token found in localStorage', 'error');
            }
        }

        async function uploadFile() {
            const output = document.getElementById('output');
            output.textContent = '';

            const fileInput = document.getElementById('fileInput');
            const tokenInput = document.getElementById('token');
            const token = tokenInput.value;

            if (!fileInput.files.length) {
                log('Please select a file', 'error');
                return;
            }

            if (!token) {
                log('Please provide a token', 'error');
                return;
            }

            const file = fileInput.files[0];
            log(`Selected: ${file.name} (${(file.size / 1024).toFixed(2)} KB)`, 'info');
            log(`File type: ${file.type}`, 'info');
            log('', 'info');
            log('Starting upload...', 'info');

            // Create FormData with file
            const formData = new FormData();
            formData.append('file', file);

            try {
                document.getElementById('uploadBtn').disabled = true;
                log('Sending to: http://localhost:5000/api/medical-reports/upload', 'info');
                log('Header: Authorization: Bearer [token]', 'info');
                log('Header: Content-Type: multipart/form-data', 'info');
                log('', 'info');

                const response = await fetch('http://localhost:5000/api/medical-reports/upload', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                    },
                    body: formData,
                });

                log(`Response Status: ${response.status}`, response.ok ? 'success' : 'error');
                log('', 'info');

                const data = await response.json();
                
                if (response.ok) {
                    log('✅ UPLOAD SUCCESSFUL!', 'success');
                    log('', 'info');
                    log('Response:', 'info');
                    log(JSON.stringify(data, null, 2), 'success');
                } else {
                    log('Upload failed!', 'error');
                    log('', 'info');
                    log('Response:', 'error');
                    log(JSON.stringify(data, null, 2), 'error');
                }
            } catch (error) {
                log(`Network Error: ${error.message}`, 'error');
                log('Check if backend server is running on http://localhost:5000', 'error');
            } finally {
                document.getElementById('uploadBtn').disabled = false;
            }
        }

        // Auto-load token on page load
        window.addEventListener('load', loadFromStorage);
    </script>
    </body>
</html>
